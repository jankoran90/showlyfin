name: Release

on:
  push:
    tags:
      - 'v*'

defaults:
  run:
    shell: bash

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs='-Xmx4g -XX:MaxMetaspaceSize=512m'"
  TAG_NAME: ${{ github.ref_name }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${{ env.TAG_NAME }}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]' | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi

          cat > /tmp/release_notes.md << EOF
          ## Changes in ${CURRENT_TAG}

          ${CHANGELOG}

          ---
          *Showlyfin — Yeshowly + Yellyfin unified app*
          EOF

      - name: Decode keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > /tmp/showlyfin.keystore
            echo "SIGNING_KEYSTORE_PATH=/tmp/showlyfin.keystore" >> $GITHUB_ENV
            echo "Keystore decoded"
          else
            echo "No keystore — unsigned build"
          fi

      - name: Build APK
        env:
          SIGNING_KEYSTORE_PATH: ${{ env.SIGNING_KEYSTORE_PATH }}
          SIGNING_ALIAS: ${{ secrets.SIGNING_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: ./gradlew clean assembleRelease --no-daemon

      - name: Copy APK
        run: |
          find app/build/outputs/apk -name '*.apk' -print0 |
            while IFS= read -r -d '' apk; do
              cp "$apk" "app/build/outputs/apk/Showlyfin-${{ env.TAG_NAME }}.apk"
            done

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.TAG_NAME }}" \
            --latest \
            --title "Showlyfin ${{ env.TAG_NAME }}" \
            --notes-file /tmp/release_notes.md \
            app/build/outputs/apk/Showlyfin-${{ env.TAG_NAME }}.apk
